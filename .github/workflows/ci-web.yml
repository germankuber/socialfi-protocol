name: CI — Web

on:
  push:
    branches: [main, master]
    paths:
      - "web/**"
      - ".github/workflows/ci-web.yml"
  pull_request:
    branches: [main, master]
    paths:
      - "web/**"
      - ".github/workflows/ci-web.yml"

concurrency:
  group: ci-web-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & fmt
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm run fmt:check
      - run: npm run lint

  build:
    name: Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      # Regenerate PAPI descriptors from the committed .scale metadata.
      # The content-hashed filenames under .papi/descriptors/dist/ change
      # whenever the PAPI CLI version bumps, so we can't rely on the
      # dist/ tree the repo ships with — we always recompute it here from
      # .papi/metadata/ and .papi/polkadot-api.json, both of which are
      # committed and versioned as the source of truth.
      - name: Regenerate PAPI descriptors
        run: |
          rm -rf .papi/descriptors/dist .papi/descriptors/generated.json
          npx papi generate
      - run: npx tsc -b
      - run: npm run build
